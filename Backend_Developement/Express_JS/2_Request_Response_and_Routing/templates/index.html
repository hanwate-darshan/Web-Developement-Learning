<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Game</title>

<style>
    body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        color: #fff;
    }

    canvas {
        background: #000;
        border: 3px solid #4caf50;
    }

    #score {
        position: absolute;
        top: 20px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>

<body>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;                             // size of grid box
let snake = [{ x: 9 * box, y: 9 * box }]; // starting position
let direction = null;
let score = 0;

// random food location
let food = {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
};

// keyboard controls
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    else if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

function drawGame() {
    // draw background
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 400, 400);

    // draw food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    // draw snake
    for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#4caf50" : "#8bc34a";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }

    // old head position
    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if (direction === "UP") snakeY -= box;
    if (direction === "DOWN") snakeY += box;
    if (direction === "LEFT") snakeX -= box;
    if (direction === "RIGHT") snakeX += box;

    // eat food
    if (snakeX === food.x && snakeY === food.y) {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        food = {
            x: Math.floor(Math.random() * 20) * box,
            y: Math.floor(Math.random() * 20) * box
        };
    } else {
        snake.pop(); // remove tail
    }

    const newHead = { x: snakeX, y: snakeY };

    // collision with wall or body
    if (
        snakeX < 0 || snakeX >= 400 ||
        snakeY < 0 || snakeY >= 400 ||
        collision(newHead, snake)
    ) {
        clearInterval(game);
        alert("Game Over! Your score was: " + score);
        location.reload();
    }

    snake.unshift(newHead);
}

function collision(head, snakeParts) {
    return snakeParts.some(part => head.x === part.x && head.y === part.y);
}

let game = setInterval(drawGame, 100);
</script>
</body>
</html>
